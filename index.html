<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Data Structures & Algorithms Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-header__text">
                <h1>C++ Algorithms Visualizer</h1>
                <p>Data Structures (Stack, Queue, Graph, Tree, List) & Validated Algorithm Sandbox.</p>
            </div>
        </header>

        <nav id="category-nav" class="app-category-nav" aria-label="Data structure categories" data-testid="category-nav"></nav>

        <section id="method-sections" class="method-sections" aria-label="Methods in selected category" data-testid="method-sections"></section>

        <div id="slide-viewer" class="slide-viewer" data-testid="slide-viewer" hidden>
            <button type="button" class="slide-viewer-backdrop" data-slide-close aria-label="Close slides"></button>
            <section class="slide-viewer-panel" role="dialog" aria-modal="true" aria-labelledby="slide-viewer-title" tabindex="-1">
                <header class="slide-viewer-header">
                    <div>
                        <p id="slide-viewer-progress">Slide 1 / 1</p>
                        <h2 id="slide-viewer-title">Method slides</h2>
                    </div>
                    <button type="button" class="slide-viewer-close" data-slide-close aria-label="Close slides">×</button>
                </header>
                <div id="slide-viewer-body" class="slide-viewer-body"></div>
                <footer class="slide-viewer-footer">
                    <button type="button" id="slide-prev" class="btn secondary">Previous</button>
                    <button type="button" id="slide-next" class="btn primary">Next</button>
                </footer>
            </section>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="desc_db.js"></script>
    <script src="code_db.js"></script>
    <script src="heap_models.js"></script>
    <script src="app.js"></script>
</body>
</html>
