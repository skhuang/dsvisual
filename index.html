<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Data Structures Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>C++ Data Structures Visualizer</h1>
            <p>Array, Linked List, Queue, Graph, and Tree Visualization.</p>
        </header>

        <div class="main-content">
            <!-- Left Panel: Visualization -->
            <section class="visualization-panel glass-panel">
                <div class="controls">
                    <div class="mode-toggle">
                        <input type="radio" id="mode-stack-arr" name="ds-mode" value="stack-array" checked>
                        <label for="mode-stack-arr">Stack(Arr)</label>
                        
                        <input type="radio" id="mode-stack-list" name="ds-mode" value="stack-list">
                        <label for="mode-stack-list">Stack(List)</label>

                        <input type="radio" id="mode-queue" name="ds-mode" value="queue">
                        <label for="mode-queue">Queue</label>

                        <input type="radio" id="mode-graph" name="ds-mode" value="graph">
                        <label for="mode-graph">Graph</label>

                        <input type="radio" id="mode-tree" name="ds-mode" value="tree">
                        <label for="mode-tree">Tree(BST)</label>
                    </div>
                    
                    <!-- Standard Actions (Stack/Queue) -->
                    <div class="actions" id="std-actions">
                        <input type="number" id="std-value" placeholder="Value" value="10">
                        <button id="btn-std-add" class="btn primary">Push()</button>
                        <button id="btn-std-remove" class="btn secondary">Pop()</button>
                    </div>

                    <!-- Graph Actions -->
                    <div class="actions hidden" id="graph-actions">
                        <input type="number" id="graph-u" placeholder="U (0-4)" min="0" max="4" value="0">
                        <input type="number" id="graph-v" placeholder="V (0-4)" min="0" max="4" value="1">
                        <button id="btn-graph-add" class="btn primary">Add Edge</button>
                    </div>

                    <!-- Tree Actions -->
                    <div class="actions hidden" id="tree-actions">
                        <input type="number" id="tree-val" placeholder="Node Value" value="50">
                        <button id="btn-tree-add" class="btn primary">Insert()</button>
                    </div>
                    
                    <div id="status-message" class="status-message">Visualizer initialized.</div>
                </div>

                <div class="stack-container-wrapper">
                    <!-- Dynamic stack visualization goes here -->
                    <div id="visualizer-container" class="stack-visualizer">
                        
                        <!-- Stack Array container -->
                        <div id="array-container" class="array-container">
                            <div class="slot empty"><span>[4]</span></div>
                            <div class="slot empty"><span>[3]</span></div>
                            <div class="slot empty"><span>[2]</span></div>
                            <div class="slot empty"><span>[1]</span></div>
                            <div class="slot empty"><span>[0]</span></div>
                        </div>

                        <!-- Stack Linked list container -->
                        <div id="linkedlist-container" class="linkedlist-container hidden">
                            <div class="head-pointer">Head Focus</div>
                            <div id="nodes-container" class="nodes-container"></div>
                            <div class="null-pointer">NULL</div>
                        </div>

                        <!-- Queue container -->
                        <div id="queue-container" class="queue-container hidden">
                            <div class="q-slot" id="qs-0"><span>[0]</span></div>
                            <div class="q-slot" id="qs-1"><span>[1]</span></div>
                            <div class="q-slot" id="qs-2"><span>[2]</span></div>
                            <div class="q-slot" id="qs-3"><span>[3]</span></div>
                            <div class="q-slot" id="qs-4"><span>[4]</span></div>
                            <!-- Pointers -->
                            <div id="front-ptr" class="q-ptr">F</div>
                            <div id="rear-ptr" class="q-ptr">R</div>
                        </div>

                        <!-- Graph container -->
                        <div id="graph-container" class="graph-container hidden">
                            <svg id="graph-edges" width="100%" height="100%"></svg>
                            <!-- 5 Fixed Nodes -->
                            <div class="graph-node" id="gn-0" style="top: 10%; left: 50%;">0</div>
                            <div class="graph-node" id="gn-1" style="top: 40%; left: 90%;">1</div>
                            <div class="graph-node" id="gn-2" style="top: 85%; left: 75%;">2</div>
                            <div class="graph-node" id="gn-3" style="top: 85%; left: 25%;">3</div>
                            <div class="graph-node" id="gn-4" style="top: 40%; left: 10%;">4</div>
                        </div>

                        <!-- Tree container -->
                        <div id="tree-container" class="tree-container hidden">
                            <svg id="tree-edges"></svg>
                            <div id="tree-nodes-container"></div>
                        </div>

                    </div>
                </div>
            </section>

            <!-- Right Panel: Code Viewer -->
            <section class="code-panel glass-panel">
                <div class="code-header">
                    <h2 id="code-title">stack_array.cpp</h2>
                </div>
                <div class="code-content">
                    <pre><code id="code-display">Loading code...</code></pre>
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
